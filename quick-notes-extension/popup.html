<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="notes-shell">
      <section class="notes-card">
        <div class="toolbar-wrap">
          <div class="toolbar" role="toolbar" aria-label="Text formatting">
            <button id="boldButton" class="tool-button" type="button" data-command="bold" data-state-command="bold" aria-label="Bold" aria-pressed="false"><strong>B</strong></button>
            <button id="italicButton" class="tool-button" type="button" data-command="italic" data-state-command="italic" aria-label="Italic" aria-pressed="false"><em>I</em></button>
            <button id="underlineButton" class="tool-button" type="button" data-command="underline" data-state-command="underline" aria-label="Underline" aria-pressed="false"><span class="tool-underline">U</span></button>
            <button id="strikeButton" class="tool-button" type="button" data-command="strikeThrough" data-state-command="strikeThrough" aria-label="Strikethrough" aria-pressed="false"><span class="tool-strike">S</span></button>

            <div class="toolbar-divider" aria-hidden="true"></div>

            <button class="tool-button" type="button" data-command="insertUnorderedList" aria-label="Bulleted list">
              <span class="tool-icon tool-bullets"></span>
            </button>
            <button class="tool-button" type="button" data-command="insertOrderedList" aria-label="Numbered list">
              <span class="tool-icon tool-numbers"></span>
            </button>

            <div class="toolbar-divider toolbar-divider-grow" aria-hidden="true"></div>

            <span id="saveStatus" class="save-status" aria-live="polite">Saved</span>
            <button id="clearButton" class="secondary-button" type="button">Clear</button>
          </div>
        </div>

        <div class="tabs-panel">
          <div class="tabs-row">
            <div id="tabsBar" class="tabs-bar" role="tablist" aria-label="Note tabs"></div>
            <div class="tab-actions">
              <button id="renameTabButton" class="icon-action-button" type="button" aria-label="Rename current tab">R</button>
              <button id="deleteTabButton" class="icon-action-button" type="button" aria-label="Delete current tab">-</button>
              <button id="addTabButton" class="add-tab-button" type="button" aria-label="Add new tab">+</button>
            </div>
          </div>
        </div>

        <div
          id="editor"
          class="editor"
          contenteditable="true"
          role="textbox"
          aria-multiline="true"
          aria-label="Notes editor"
          data-placeholder="Jot something down. Notes save automatically."
        ></div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
